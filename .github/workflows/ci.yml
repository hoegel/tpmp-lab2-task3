name: c build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: clean with make
        run: make clean

      - name: create obj directory
        run: mkdir -p obj

      - name: build with make
        run: make build

      - name: run program
        run: make run
